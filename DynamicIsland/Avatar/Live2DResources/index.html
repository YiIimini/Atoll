<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:transparent; }
canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
// ========== Atoll Avatar — Pure Canvas 2D Character ==========
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, cx, cy, scale;
let phase = 0, blinkTimer = 0, blinkState = 1;
let expression = 'neutral', mouthOpen = 0;
let idleAngle = 0, idleBob = 0;

function resize() {
    W = canvas.width = canvas.clientWidth * (window.devicePixelRatio || 1);
    H = canvas.height = canvas.clientHeight * (window.devicePixelRatio || 1);
    cx = W / 2; cy = H * 0.45; scale = Math.min(W, H) * 0.38;
}
resize();
window.addEventListener('resize', resize);

// Expression presets
const exprMap = {
    neutral:  { eyeH:1.0, mouthCurve:0,  browY:0,  blush:0 },
    happy:    { eyeH:0.7, mouthCurve:0.3, browY:-0.05, blush:0.4 },
    sad:      { eyeH:1.1, mouthCurve:-0.2, browY:0.05, blush:0 },
    angry:    { eyeH:0.8, mouthCurve:-0.1, browY:-0.08, blush:0.2 },
    surprised:{ eyeH:1.3, mouthCurve:0,  browY:-0.1,  blush:0.1 },
    thinking: { eyeH:0.9, mouthCurve:0.05, browY:-0.02, blush:0 }
};

// Interpolation for smooth transitions
let curExpr = {...exprMap.neutral};
let tgtExpr = {...exprMap.neutral};

function lerp(a,b,t) { return a + (b-a) * t; }

function draw() {
    phase += 0.016;
    ctx.clearRect(0, 0, W, H);

    // Smooth expression transition
    for (let k in curExpr) curExpr[k] = lerp(curExpr[k], tgtExpr[k], 0.08);

    // Idle animation
    idleAngle = Math.sin(phase * 0.8) * 0.03;
    idleBob = Math.sin(phase * 1.2) * 0.015;

    // Blink
    blinkTimer += 0.016;
    if (blinkTimer > 3 + Math.random() * 4) { blinkTimer = 0; blinkState = 0; }
    blinkState = Math.min(1, blinkState + 0.2);

    const s = scale;
    const ex = curExpr, bl = blinkState * (1 - 0.3 * ex.eyeH);

    ctx.save();
    ctx.translate(cx, cy + idleBob * s);
    ctx.rotate(idleAngle);

    // === Hair ===
    ctx.fillStyle = '#4A3728';
    ctx.beginPath();
    ctx.arc(0, s * 0.1, s * 0.85, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = '#5C4535';
    ctx.beginPath();
    ctx.arc(-s*0.7, -s*0.25, s*0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s*0.7, -s*0.25, s*0.3, 0, Math.PI*2);
    ctx.fill();
    // Bangs
    ctx.fillStyle = '#3D2E20';
    ctx.beginPath();
    ctx.ellipse(0, -s*0.65, s*0.7, s*0.25, 0, Math.PI, 0);
    ctx.fill();

    // === Face ===
    ctx.fillStyle = '#FFE4C4';
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.72, 0, Math.PI * 2);
    ctx.fill();

    // === Blush ===
    if (ex.blush > 0.01) {
        ctx.fillStyle = `rgba(255,150,150,${ex.blush*0.4})`;
        ctx.beginPath(); ctx.ellipse(-s*0.35, s*0.15, s*0.12, s*0.08, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(s*0.35, s*0.15, s*0.12, s*0.08, 0, 0, Math.PI*2); ctx.fill();
    }

    // === Eyes ===
    const eyeY = -s * 0.05 + ex.browY * s;
    const eyeW = s * 0.18;
    const eyeH = s * 0.18 * bl * (2 - ex.eyeH);

    [-1, 1].forEach(side => {
        const ex = side * s * 0.2;
        // Eye white
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.ellipse(ex, eyeY, eyeW, eyeH, 0, 0, Math.PI*2);
        ctx.fill();
        // Iris
        ctx.fillStyle = '#5B8C5A';
        ctx.beginPath();
        ctx.arc(ex + side * s * 0.02, eyeY, eyeW * 0.45 * bl, 0, Math.PI*2);
        ctx.fill();
        // Pupil
        ctx.fillStyle = '#1A1A2E';
        ctx.beginPath();
        ctx.arc(ex + side * s * 0.02, eyeY, eyeW * 0.2 * bl, 0, Math.PI*2);
        ctx.fill();
        // Highlight
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(ex - side * s * 0.03, eyeY - s * 0.04, eyeW * 0.12, 0, Math.PI*2);
        ctx.fill();
    });

    // === Eyebrows ===
    ctx.strokeStyle = '#3D2E20';
    ctx.lineWidth = s * 0.04;
    ctx.lineCap = 'round';
    const browY = eyeY - s * 0.2;
    const browA = ex.mouthCurve; // brows curve with mood
    [-1, 1].forEach(side => {
        ctx.beginPath();
        ctx.moveTo(side * s * 0.32, browY - browA * s * 0.3);
        ctx.quadraticCurveTo(side * s * 0.2, browY - s*0.02 + browA*s*0.1, side * s * 0.08, browY + s*0.02);
        ctx.stroke();
    });

    // === Mouth ===
    const mouthY = s * 0.22;
    const mOpen = mouthOpen * s * 0.28; // real-time mouth from bridge
    const mCurve = ex.mouthCurve * s * 0.1;

    ctx.strokeStyle = '#C4756E';
    ctx.lineWidth = s * 0.03;
    ctx.lineCap = 'round';
    ctx.beginPath();
    if (mOpen > 0.02) {
        // Open mouth
        ctx.moveTo(-s*0.15, mouthY + mCurve);
        ctx.quadraticCurveTo(0, mouthY + mOpen, s*0.15, mouthY + mCurve);
    } else {
        // Closed mouth
        ctx.moveTo(-s*0.15, mouthY + mCurve);
        ctx.quadraticCurveTo(0, mouthY - mCurve, s*0.15, mouthY + mCurve);
    }
    ctx.stroke();

    // === Nose ===
    ctx.strokeStyle = '#D4A574';
    ctx.lineWidth = s * 0.015;
    ctx.beginPath();
    ctx.moveTo(0, mouthY - s*0.18);
    ctx.quadraticCurveTo(s*0.02, mouthY - s*0.14, 0, mouthY - s*0.1);
    ctx.stroke();

    ctx.restore();
    requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// ========== Swift ↔ JS Bridge ==========
window.addEventListener('message', (event) => {
    const msg = event.data;
    if (!msg || !msg.type) return;

    switch(msg.type) {
        case 'expression':
            expression = msg.name;
            tgtExpr = exprMap[msg.name] || exprMap.neutral;
            break;
        case 'mouthOpen':
            mouthOpen = Math.max(0, Math.min(1, msg.ratio || 0));
            break;
        case 'motion':
            // Simple motion: trigger eye blink
            blinkState = 0;
            break;
    }
});

window.addEventListener('DOMContentLoaded', () => {
    if (window.webkit && window.webkit.messageHandlers.atoll) {
        window.webkit.messageHandlers.atoll.postMessage({ type:'pageReady' });
    }
});

document.addEventListener('click', () => {
    if (window.webkit && window.webkit.messageHandlers.atoll) {
        window.webkit.messageHandlers.atoll.postMessage({ type:'tap' });
    }
});
</script>
</body>
</html>
