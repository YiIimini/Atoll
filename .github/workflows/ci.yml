name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: End-to-End Tests
    strategy:
      matrix:
        # macOS 26 and 27 might not be natively supported on GitHub-hosted runners yet.
        # But we specify them as requested. You might need self-hosted runners for 26 and 27.
        macos_version: [macos-14, macos-15, macos-26]
      fail-fast: false
    runs-on: ${{ matrix.macos_version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download Metal Toolchain
        run: |
          sudo xcodebuild -runFirstLaunch
          for i in 1 2 3 4 5; do
            sudo xcodebuild -downloadComponent MetalToolchain && break || sleep 10
          done

      - name: Build and Test
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          sudo DevToolsSecurity -enable
          
          if [ -n "$CERTIFICATE_BASE64" ]; then
            # Import certificate to build keychain
            CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
            security create-keychain -p "" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "" $KEYCHAIN_PATH
            security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
            security list-keychain -d user -s $KEYCHAIN_PATH
            
            xcodebuild test \
              -project DynamicIsland.xcodeproj \
              -scheme DynamicIsland \
              -destination "platform=macOS" \
              -enableCodeCoverage YES \
              OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="Developer ID Application" \
              PROVISIONING_PROFILE_SPECIFIER="" \
              CODE_SIGN_INJECT_BASE_ENTITLEMENTS=YES
          else
            # Fallback to ad-hoc with stripped entitlements if no cert is available
            echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict></dict></plist>' > DynamicIsland/DynamicIsland.entitlements
            xcodebuild test \
              -project DynamicIsland.xcodeproj \
              -scheme DynamicIsland \
              -destination "platform=macOS" \
              -enableCodeCoverage YES \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=YES \
              CODE_SIGN_ENTITLEMENTS="DynamicIsland/DynamicIsland.entitlements" \
              CODE_SIGN_INJECT_BASE_ENTITLEMENTS=YES
          fi

